<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Vortex Hub Pro - Tienda digital premium con integración IPTV, streaming, gaming y servicios digitales."/>
  <meta name="theme-color" content="#001827"/>
  <title>Vortex Hub Pro · IPTV & Tienda Digital</title>

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">

  <style>
    /* ================================================================
       RESET Y VARIABLES
    ================================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --fondo-body: #080e1a;
      --fondo-card: #111c2e;
      --fondo-header: #050d1a;
      --fondo-nav: #0a1428;

      --texto-primario: #f1f5f9;
      --texto-secundario: #94a3b8;
      --texto-terciario: #64748b;

      --cielo: #00eaff;
      --azul: #2563eb;
      --azul-hover: #3b82f6;
      --morado: #7c3aed;
      --verde: #10b981;
      --rosa: #ec4899;
      --naranja: #f97316;
      --whatsapp: #25d366;

      --radio: 20px;
      --sombra-card: 0 8px 32px rgba(0, 0, 0, 0.5);
      --sombra-hover: 0 16px 48px rgba(0, 234, 255, 0.08);
      --transicion: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--fondo-body);
      color: var(--texto-primario);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 1380px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* ================================================================
       SCROLLBAR PERSONALIZADA
    ================================================================ */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--fondo-body); }
    ::-webkit-scrollbar-thumb { background: var(--azul); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--cielo); }

    /* ================================================================
       HEADER
    ================================================================ */
    header {
      background: linear-gradient(145deg, #050d1a, #001b2e, #050d1a);
      padding: 48px 20px 36px;
      text-align: center;
      width: 100%;
      border-bottom: 2px solid rgba(0, 234, 255, 0.15);
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(0, 234, 255, 0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    .logo {
      font-size: 44px;
      font-weight: 900;
      color: var(--cielo);
      text-shadow: 0 0 40px rgba(0, 234, 255, 0.15);
      letter-spacing: -1px;
      position: relative;
    }
    .logo i {
      margin-right: 8px;
      background: linear-gradient(135deg, var(--cielo), var(--azul));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header .slogan {
      color: var(--texto-secundario);
      font-size: 1.05rem;
      margin-top: 6px;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    header .contacto-header {
      color: var(--texto-terciario);
      font-size: 0.85rem;
      margin-top: 10px;
    }
    header .contacto-header i {
      color: var(--cielo);
      margin-right: 6px;
    }

    /* ================================================================
       NAV
    ================================================================ */
    nav {
      background: rgba(10, 20, 40, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 14px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      border-bottom: 1px solid rgba(0, 234, 255, 0.08);
    }
    nav a {
      color: var(--texto-secundario);
      text-decoration: none;
      margin: 0 18px;
      font-weight: 600;
      font-size: 0.85rem;
      transition: color 0.25s ease;
      letter-spacing: 0.3px;
      padding: 6px 4px;
      position: relative;
    }
    nav a::after {
      content: "";
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--cielo), var(--azul));
      transition: width 0.3s ease;
    }
    nav a:hover::after {
      width: 100%;
    }
    nav a:hover {
      color: var(--texto-primario);
    }
    nav a i {
      margin-right: 6px;
    }

    /* ================================================================
       HERO BANNER
    ================================================================ */
    .hero-banner {
      background: linear-gradient(135deg, rgba(0, 27, 46, 0.8), rgba(8, 14, 26, 0.9)), url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%2300eaff" fill-opacity="0.03"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');
      border-radius: var(--radio);
      padding: 60px 40px;
      margin: 30px auto 40px;
      text-align: center;
      border: 1px solid rgba(0, 234, 255, 0.06);
      position: relative;
      overflow: hidden;
    }
    .hero-banner h2 {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--texto-primario);
      margin-bottom: 12px;
    }
    .hero-banner h2 span {
      color: var(--cielo);
    }
    .hero-banner p {
      color: var(--texto-secundario);
      font-size: 1.1rem;
      max-width: 600px;
      margin: 0 auto 24px;
    }
    .hero-banner .btn-hero {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--cielo), var(--azul));
      color: #0a1428;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 36px;
      border-radius: 60px;
      text-decoration: none;
      transition: all var(--transicion);
      box-shadow: 0 4px 30px rgba(0, 234, 255, 0.20);
    }
    .hero-banner .btn-hero:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 40px rgba(0, 234, 255, 0.30);
    }

    /* ================================================================
       TÍTULOS DE SECCIÓN
    ================================================================ */
    .section-title {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      color: var(--texto-primario);
      margin: 44px 0 32px;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .section-title .badge {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 4px 14px;
      border-radius: 40px;
      background: rgba(0, 234, 255, 0.10);
      color: var(--cielo);
      border: 1px solid rgba(0, 234, 255, 0.10);
    }
    .section-title i {
      color: var(--cielo);
    }

    /* ================================================================
       FILTROS / CATEGORÍAS
    ================================================================ */
    .filtros {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }
    .filtros button {
      background: var(--fondo-card);
      color: var(--texto-secundario);
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 8px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all var(--transicion);
      font-family: "Inter", sans-serif;
    }
    .filtros button:hover,
    .filtros button.activo {
      background: linear-gradient(135deg, var(--cielo), var(--azul));
      color: #0a1428;
      border-color: transparent;
      box-shadow: 0 4px 20px rgba(0, 234, 255, 0.15);
    }

    /* ================================================================
       GRID
    ================================================================ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 22px;
      width: 100%;
    }

    /* ================================================================
       TARJETA PRODUCTO
    ================================================================ */
    .card {
      background: var(--fondo-card);
      border-radius: var(--radio);
      padding: 22px 14px 18px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: var(--sombra-card);
      transition: all var(--transicion);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--azul), var(--cielo), var(--morado));
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .card:hover::before {
      opacity: 1;
    }
    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(0, 234, 255, 0.10);
      box-shadow: var(--sombra-hover);
    }

    .card .icono {
      font-size: 2rem;
      color: var(--cielo);
      margin-bottom: 4px;
      opacity: 0.8;
    }

    .card h3 {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--texto-primario);
      line-height: 1.35;
      min-height: 2.6rem;
      margin-bottom: 2px;
    }

    .card .precio {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--cielo);
      margin: 4px 0 14px;
      letter-spacing: -0.3px;
    }
    .card .precio small {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--texto-terciario);
      margin-left: 2px;
    }

    .card .tag-oferta {
      position: absolute;
      top: 12px;
      right: 12px;
      background: linear-gradient(135deg, var(--naranja), #dc2626);
      color: #fff;
      font-size: 0.55rem;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 40px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card .tag-nuevo {
      position: absolute;
      top: 12px;
      left: 12px;
      background: linear-gradient(135deg, var(--verde), #059669);
      color: #fff;
      font-size: 0.55rem;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 40px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ================================================================
       BOTÓN
    ================================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--cielo), var(--azul));
      color: #0a1428;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 10px 24px;
      border-radius: 60px;
      text-decoration: none;
      transition: all var(--transicion);
      box-shadow: 0 4px 20px rgba(0, 234, 255, 0.15);
      width: 100%;
      max-width: 170px;
      justify-content: center;
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 32px rgba(0, 234, 255, 0.25);
    }
    .btn i {
      font-size: 0.95rem;
    }

    /* ================================================================
       SECCIÓN IPTV - app.miflujtv.tv (COMPLEMENTO)
    ================================================================ */
    .iptv-container {
      background: var(--fondo-card);
      border-radius: var(--radio);
      padding: 0;
      border: 1px solid rgba(0, 234, 255, 0.06);
      box-shadow: var(--sombra-card);
      overflow: hidden;
      margin-top: 10px;
    }
    .iptv-header {
      background: linear-gradient(135deg, rgba(0, 234, 255, 0.05), rgba(37, 99, 235, 0.05));
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    .iptv-header h3 {
      color: var(--cielo);
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .iptv-header h3 i {
      font-size: 1.3rem;
    }
    .iptv-header .iptv-url {
      color: var(--texto-terciario);
      font-size: 0.8rem;
      font-weight: 500;
    }
    .iptv-header .iptv-url i {
      color: var(--cielo);
      margin-right: 4px;
    }
    .iptv-iframe {
      width: 100%;
      height: 650px;
      border: none;
      background: #050d1a;
      display: block;
    }
    .iptv-footer {
      padding: 12px 24px;
      background: rgba(0, 0, 0, 0.2);
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .iptv-footer p {
      color: var(--texto-terciario);
      font-size: 0.75rem;
    }
    .iptv-footer p i {
      color: var(--cielo);
      margin-right: 4px;
    }
    .iptv-footer .btn-iptv {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 234, 255, 0.08);
      color: var(--cielo);
      padding: 6px 16px;
      border-radius: 40px;
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1
