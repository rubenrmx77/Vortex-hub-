<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vortex Hub Pro · Tienda Digital</title>
  
  <!-- Fuentes e íconos -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* ============================================================
       RESET Y VARIABLES
    ============================================================ */
    :root {
      --fondo: #f0f4fe;
      --blanco: #ffffff;
      --texto-primario: #0a1628;
      --texto-secundario: #475569;
      --azul: #2563eb;
      --azul-oscuro: #1d4ed8;
      --morado: #7c3aed;
      --verde: #10b981;
      --cielo: #00eaff;
      --sombra-suave: 0 8px 30px rgba(0, 0, 0, 0.06);
      --sombra-hover: 0 20px 50px -12px rgba(0, 0, 0, 0.18);
      --radio: 20px;
      --transicion: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--fondo);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--texto-primario);
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1380px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* ============================================================
       HEADER
    ============================================================ */
    header {
      background: linear-gradient(135deg, #001827, #003b55, #000);
      padding: 50px 20px 40px;
      text-align: center;
      width: 100%;
      border-bottom: 3px solid var(--cielo);
    }

    .logo {
      font-size: 48px;
      font-weight: 900;
      color: var(--cielo);
      text-shadow: 0 0 30px rgba(0, 234, 255, 0.3);
      letter-spacing: -1px;
    }
    .logo i {
      margin-right: 8px;
    }

    header p {
      color: #cbd5e1;
      font-size: 18px;
      margin-top: 6px;
    }

    header .contacto {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 10px;
    }
    header .contacto i {
      color: var(--cielo);
      margin-right: 6px;
    }

    /* ============================================================
       NAV
    ============================================================ */
    nav {
      background: #0f1a2e;
      padding: 14px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      border-bottom: 1px solid rgba(0, 234, 255, 0.15);
      backdrop-filter: blur(12px);
    }
    nav a {
      color: #cbd5e1;
      text-decoration: none;
      margin: 0 16px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: color 0.2s;
      letter-spacing: 0.3px;
    }
    nav a:hover {
      color: var(--cielo);
    }
    nav a i {
      margin-right: 6px;
    }

    /* ============================================================
       TÍTULOS
    ============================================================ */
    .titulo {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      color: var(--texto-primario);
      margin: 40px 0 32px;
      letter-spacing: -0.5px;
    }
    .titulo i {
      color: var(--azul);
      margin-right: 10px;
    }
    .titulo .badge {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 4px 14px;
      border-radius: 40px;
      background: rgba(37, 99, 235, 0.10);
      color: var(--azul);
      margin-left: 10px;
      vertical-align: middle;
    }

    /* ============================================================
       GRID
    ============================================================ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 24px;
      width: 100%;
    }

    /* ============================================================
       TARJETA PRODUCTO
    ============================================================ */
    .card {
      background: var(--blanco);
      border-radius: var(--radio);
      padding: 24px 16px 20px;
      text-align: center;
      box-shadow: var(--sombra-suave);
      border: 1px solid rgba(226, 232, 240, 0.6);
      transition: all var(--transicion);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: var(--sombra-hover);
      border-color: rgba(37, 99, 235, 0.15);
    }

    .card .icono {
      font-size: 2.2rem;
      color: var(--azul);
      margin-bottom: 4px;
    }

    .card h3 {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--texto-primario);
      line-height: 1.3;
      min-height: 2.6rem;
      margin-bottom: 2px;
    }

    .card .precio {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--azul);
      margin: 6px 0 14px;
      letter-spacing: -0.5px;
    }
    .card .precio small {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--texto-secundario);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--azul), var(--morado));
      color: #fff;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 10px 28px;
      border-radius: 60px;
      text-decoration: none;
      transition: all var(--transicion);
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.25);
      width: 100%;
      max-width: 180px;
      justify-content: center;
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 28px rgba(37, 99, 235, 0.35);
    }
    .btn i {
      font-size: 1rem;
    }

    /* ============================================================
       TARJETA TESTIMONIO
    ============================================================ */
    .card-testimonio {
      background: var(--blanco);
      border-radius: var(--radio);
      padding: 22px 16px 18px;
      text-align: center;
      border: 1px solid #eef2f6;
      box-shadow: var(--sombra-suave);
      transition: all var(--transicion);
    }
    .card-testimonio:hover {
      transform: translateY(-6px);
      box-shadow: var(--sombra-hover);
    }

    .card-testimonio .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--azul), var(--morado));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.20);
    }
    .card-testimonio h4 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--texto-primario);
    }
    .card-testimonio .stars {
      color: #fbbf24;
      font-size: 1.1rem;
      letter-spacing: 2px;
      margin: 4px 0 6px;
    }
    .card-testimonio .review {
      color: var(--texto-secundario);
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .card-testimonio .verified {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 10px;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--verde);
      background: #ecfdf5;
      padding: 3px 14px;
      border-radius: 40px;
    }

    /* ============================================================
       ADMIN
    ============================================================ */
    .admin-card {
      background: var(--blanco);
      border-radius: var(--radio);
      padding: 32px 24px;
      text-align: center;
      max-width: 420px;
      margin: 0 auto;
      border: 1px solid #eef2f6;
      box-shadow: var(--sombra-suave);
    }
    .admin-card .lock-icon {
      font-size: 2.8rem;
      color: var(--azul);
      margin-bottom: 8px;
    }
    .admin-card p {
      color: var(--texto-secundario);
      margin: 8px 0 2px;
      font-weight: 500;
      font-size: 0.9rem;
    }
    .admin-card .credencial {
      display: inline-block;
      background: #f1f5f9;
      padding: 6px 20px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--texto-primario);
      margin-bottom: 6px;
      font-family: "Inter", monospace;
      letter-spacing: 0.3px;
    }
    .admin-card .badge-admin {
      display: inline-block;
      background: #fef3c7;
      color: #b45309;
      font-weight: 600;
      font-size: 0.7rem;
      padding: 4px 18px;
      border-radius: 40px;
      margin-top: 12px;
    }

    #panelAdmin {
      display: none;
      background: #0f1a2e;
      padding: 28px 24px;
      max-width: 500px;
      margin: 24px auto;
      border-radius: var(--radio);
      border: 1px solid var(--cielo);
      color: #cbd5e1;
      text-align: center;
    }
    #panelAdmin h2 {
      color: var(--cielo);
      margin-bottom: 12px;
    }
    #panelAdmin ul {
      list-style: none;
      padding: 0;
      margin: 12px 0;
    }
    #panelAdmin ul li {
      padding: 4px 0;
      color: #94a3b8;
    }
    #panelAdmin ul li::before {
      content: "✓ ";
      color: var(--verde);
    }

    /* ============================================================
       WHATSAPP FLOTANTE
    ============================================================ */
    .whatsapp-float {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #25d366;
      color: #fff;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      text-decoration: none;
      box-shadow: 0 8px 32px rgba(37, 211, 102, 0.40);
      transition: all 0.3s ease;
      z-index: 999;
      animation: pulse-whatsapp 2.5s infinite;
    }
    .whatsapp-float:hover {
      transform: scale(1.10);
      box-shadow: 0 12px 44px rgba(37, 211, 102, 0.50);
    }
    @keyframes pulse-whatsapp {
      0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.4); }
      70% { box-shadow: 0 0 0 16px rgba(37, 211, 102, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
    }

    /* ============================================================
       FOOTER
    ============================================================ */
    footer {
      width: 100%;
      background: #0a1628;
      color: #94a3b8;
      text-align: center;
      padding: 40px 24px 32px;
      border-radius: 28px 28px 0 0;
    }
    footer .footer-brand {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    footer .footer-brand i {
      color: var(--cielo);
      margin-right: 6px;
    }
    footer .footer-links {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
      margin: 12px 0 16px;
    }
    footer .footer-links a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    footer .footer-links a:hover {
      color: #fff;
    }
    footer .footer-links a i {
      margin-right: 4px;
    }
    footer .footer-copy {
      font-size: 0.8rem;
      color: #64748b;
      border-top: 1px solid #1e293b;
      padding-top: 16px;
      margin-top: 8px;
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 640px) {
      .container { padding: 0 12px 40px; }
      .logo { font-size: 32px; }
      .titulo { font-size: 1.4rem; margin: 28px 0 20px; }
      .grid { gap: 16px; }
      .card { padding: 18px 12px 16px; }
      .whatsapp-float { width: 56px; height: 56px; font-size: 1.8rem; bottom: 16px; right: 16px; }
      nav a { margin: 0 10px; font-size: 0.8rem; }
      .admin-card { padding: 20px 16px; }
      footer .footer-links { gap: 16px; }
    }

    /* ============================================================
       ANIMACIÓN DE ENTRADA
    ============================================================ */
    .card, .card-testimonio {
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }
    .card:nth-child(1) { animation-delay: 0.03s; }
    .card:nth-child(2) { animation-delay: 0.06s; }
    .card:nth-child(3) { animation-delay: 0.09s; }
    .card:nth-child(4) { animation-delay: 0.12s; }
    .card:nth-child(5) { animation-delay: 0.15s; }
    .card:nth-child(6) { animation-delay: 0.18s; }
    .card:nth-child(7) { animation-delay: 0.21s; }
    .card:nth-child(8) { animation-delay: 0.24s; }
    .card:nth-child(9) { animation-delay: 0.27s; }
    .card:nth-child(10) { animation-delay: 0.30s; }
    .card:nth-child(11) { animation-delay: 0.33s; }
    .card:nth-child(12) { animation-delay: 0.36s; }
    .card:nth-child(13) { animation-delay: 0.39s; }
    .card:nth-child(14) { animation-delay: 0.42s; }
    .card:nth-child(15) { animation-delay: 0.45s; }
    .card:nth-child(16) { animation-delay: 0.48s; }
    .card:nth-child(17) { animation-delay: 0.51s; }
    .card:nth-child(18) { animation-delay: 0.54s; }
    .card:nth-child(19) { animation-delay: 0.57s; }
    .card:nth-child(20) { animation-delay: 0.60s; }
    .card:nth-child(21) { animation-delay: 0.63s; }
    .card:nth-child(22) { animation-delay: 0.66s; }
    .card:nth-child(23) { animation-delay: 0.69s; }
    .card:nth-child(24) { animation-delay: 0.72s; }
    .card:nth-child(25) { animation-delay: 0.75s; }
    .card:nth-child(26) { animation-delay: 0.78s; }
    .card:nth-child(27) { animation-delay: 0.81s; }
    .card:nth-child(28) { animation-delay: 0.84s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
